<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تحميل تطبيق مصرف السلام كابيتال</title>
  <style>
    body{font-family:Arial,system-ui;max-width:560px;margin:40px auto;padding:0 16px;line-height:1.6}
    .card{border:1px solid #eee;border-radius:12px;padding:18px}
    a.btn{display:block;padding:12px 14px;margin:10px 0;background:#111;color:#fff;text-decoration:none;border-radius:10px;text-align:center}
    a.btn.secondary{background:#0a7cff}
    .muted{color:#666;font-size:14px;margin-top:6px}
  </style>
</head>
<body>
  <div class="card">
    <h2>تحميل التطبيق</h2>
    <div class="muted">سيتم تحويلك تلقائيًا حسب جهازك. إذا لم يتم التحويل اختر المتجر:</div>

    <a class="btn" id="play"
       href="https://play.google.com/store/apps/details?id=com.AamalTech.AlsalamCapitalBank">
      Google Play (Android)
    </a>

    <a class="btn secondary" id="ios"
       href="https://apps.apple.com/ae/app/alsalam-capital-mobile/id6503481023">
      App Store (iPhone)
    </a>
  </div>

  <script>
    const play = document.getElementById('play').href;
    const ios  = document.getElementById('ios').href;

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /android/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

    // تحويل تلقائي
    if (isAndroid) window.location.replace(play);
    else if (isIOS) window.location.replace(ios);
  </script>
</body>
</html>
